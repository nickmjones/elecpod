<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data:; media-src 'self' https:; script-src 'self'; style-src 'self'; connect-src 'self'"
    />
    <title>elecpod</title>
    <link rel="stylesheet" href="./node_modules/material-symbols/outlined.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <input id="search-input" type="search" placeholder="Search podcasts…" />
        </div>
        <nav id="sidebar-nav">
          <div class="nav-item" data-view="podcasts"><span class="mi nav-icon">podcasts</span>Podcasts</div>
          <div class="nav-item" data-view="incoming">
            <span class="mi nav-icon">inbox</span>Incoming
            <button id="refresh-btn" class="btn btn-ghost btn-icon btn-sm" title="Refresh feeds"><span class="mi">refresh</span></button>
          </div>
          <div class="nav-item" data-view="discover"><span class="mi nav-icon">explore</span>Discover</div>
          <div class="nav-item" data-view="in-progress"><span class="mi nav-icon">history</span>In Progress</div>
          <div class="nav-item" data-view="favorites"><span class="mi mi-fill nav-icon">star</span>Favorites</div>
          <div class="section-head">
            <span>Folders</span>
            <span class="head-actions">
              <button id="add-url-btn" class="btn btn-ghost btn-icon btn-sm" title="Add podcast by feed URL"><span class="mi">link</span></button>
              <button id="new-folder-btn" class="btn btn-ghost btn-icon btn-sm" title="New folder"><span class="mi">add</span></button>
            </span>
          </div>
          <div id="folders-list"></div>
          <div class="section-head">
            <span>Playlists</span>
            <span class="head-actions">
              <button id="new-playlist-btn" class="btn btn-ghost btn-icon btn-sm" title="New playlist"><span class="mi">add</span></button>
            </span>
          </div>
          <div id="playlists-list"></div>
        </nav>
        <div class="sidebar-footer">
          <div class="nav-item" data-view="settings"><span class="mi nav-icon-muted">settings</span>Settings</div>
        </div>
      </aside>
      <main id="main">
        <header id="main-toolbar">
          <div class="tb-section tb-transport">
            <button id="pc-skip-back" class="pc-btn" title="Back 30s" disabled><span class="mi">replay_30</span></button>
            <button id="pc-play" class="pc-btn pc-play" title="Play" data-state="play" disabled>
              <span class="mi mi-fill pc-play-icon" data-icon="play">play_arrow</span>
              <span class="mi mi-fill pc-play-icon" data-icon="pause">pause</span>
              <span class="mi pc-play-icon" data-icon="loading">progress_activity</span>
            </button>
            <button id="pc-skip-fwd" class="pc-btn" title="Forward 30s" disabled><span class="mi">forward_30</span></button>
          </div>
          <div class="tb-section tb-np" id="now-playing">
            <div id="np-art" class="np-art"><img alt="" /></div>
            <div class="np-text">
              <div id="np-title">Nothing playing</div>
              <div id="np-podcast"></div>
            </div>
            <div class="np-seek">
              <span id="pc-cur" class="pc-time">0:00</span>
              <input id="pc-seek" class="pc-range" type="range" min="0" max="1000" value="0" step="1" disabled />
              <span id="pc-dur" class="pc-time">0:00</span>
            </div>
          </div>
          <div class="tb-section tb-audio">
            <button id="pc-mute" class="pc-btn" title="Mute"><span class="mi">volume_up</span></button>
            <input id="pc-vol" class="pc-range pc-vol" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <audio id="audio" preload="none"></audio>
        </header>
        <div id="main-scroll">
          <div id="view"></div>
          <div id="selection-bar" class="floating-selection-bar" data-hidden="true" aria-hidden="true">
            <div class="sel-inner">
              <span class="sel-count">0 selected</span>
              <button data-act="sel-add-playlist" class="btn btn-primary btn-pill">Add to playlist</button>
              <button data-act="sel-skip" class="btn btn-ghost btn-icon btn-pill" title="Skip selected"><span class="mi">hearing_disabled</span></button>
              <button data-act="sel-clear" class="btn btn-default btn-pill">Clear</button>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
